image: node:16

before_script:
  - corepack enable
  - corepack prepare pnpm@latest-8 --activate
  - pnpm config set store-dir .pnpm-store

stages:
  - build
  - deploy

variables:
  KUBERNETES_CPU_REQUEST: "1"
  KUBERNETES_CPU_LIMIT: "4"
  KUBERNETES_MEMORY_REQUEST: "512Mi"
  KUBERNETES_MEMORY_LIMIT: "4Gi"
  KUBERNETES_EPHEMERAL_STORAGE_REQUEST: "2Gi"
  KUBERNETES_EPHEMERAL_STORAGE_LIMIT: "5Gi"

generate:
  stage: build
  script:
    - pnpm i --frozen-lockfile
    - pnpm run generate
  cache:
    key:
      files:
        - package.json
        - pnpm-lock.yaml
    paths:
      - node_modules/
  artifacts:
    paths:
      - .output/public
    expire_in: 10 mins
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

pages:
  stage: deploy
  needs: [ generate ]
  variables:
    GIT_STRATEGY: none
  script:
    - mv .output/public ./public
  artifacts:
    paths:
      - public
    # only does expire, if it is not the latest commit ref
    expire_in: 5 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
